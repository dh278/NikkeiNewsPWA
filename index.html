<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>日経ニュースダッシュボード</title>

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#0f3d91">

</head>


<body>


<header>

<h1>📰 日経ニュースダッシュボード</h1>

<p>
NikkeiNewsPWA Ver.3
</p>

</header>



<section class="control">

<!-- PDF読み込み -->

<input
type="file"
id="pdfFile"
accept="application/pdf">

<!-- 日付選択 -->

<input
id="dateSelect"
type="date">



<!-- 検索 -->

<input
id="search"
type="text"
placeholder="ニュースを検索">



<!-- カテゴリ -->

<select id="category">

<option value="">
すべて
</option>

<option value="AI">
AI
</option>

<option value="半導体">
半導体
</option>

<option value="金融">
金融
</option>

<option value="製造業">
製造業
</option>

<option value="物流">
物流
</option>

<option value="海外">
海外
</option>

</select>



<button id="darkMode">
🌙
</button>


</section>





<main>


<section>

<h2>
📌 ニュース一覧
</h2>


<div id="newsList">

読み込み中…

</div>


</section>





<section class="dashboard">


<h2>
📊 分析ダッシュボード
</h2>



<div class="cards">


<div class="card">

<h3>
記事数
</h3>

<p id="count">
0
</p>

</div>




<div class="card">

<h3>
注目テーマ
</h3>

<p id="theme">
---
</p>

</div>




<div class="card">

<h3>
更新日
</h3>

<p id="date">
---
</p>

</div>



</div>


</section>



<br>


<a href="favorite.html">

⭐ お気に入り一覧

</a>



</main>




<footer>

<p>
NikkeiNewsPWA Ver.3
</p>

</footer>




<script src="app.js"></script>

<script 
src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js">
</script>

<script src="pdf-reader.js"></script>

<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register(
"service-worker.js"
);

}

</script>



</body>

</html>
